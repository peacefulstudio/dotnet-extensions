name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.slnx'
      - '**.props'
      - '**.targets'
      - 'global.json'
      - 'coverage.settings.xml'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [main]

env:
  COVERAGE_VERSION: '18.0.6'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Install dotnet-coverage
        run: |
          set -euo pipefail
          dotnet tool update -g dotnet-coverage --version ${COVERAGE_VERSION}

      - name: Restore
        run: |
          set -euo pipefail
          dotnet restore

      - name: Build
        run: |
          set -euo pipefail
          dotnet build --configuration Release --no-restore

      - name: Test with MTP coverage
        run: |
          set -euo pipefail
          dotnet test --configuration Release --no-build

      - name: Merge per-project cobertura reports
        run: |
          set -euo pipefail
          mkdir -p coverage
          shopt -s globstar nullglob
          cobertura_files=(TestResults/**/*.cobertura.xml tests/**/bin/Release/net*/**/*.cobertura.xml)
          if [ ${#cobertura_files[@]} -eq 0 ]; then
            echo "::error::No .cobertura.xml files produced — did MTP coverage extension run?"
            exit 1
          fi
          echo "Merging ${#cobertura_files[@]} cobertura files: ${cobertura_files[*]}"
          dotnet-coverage merge \
            -o coverage/merged.cobertura.xml \
            -f cobertura \
            "${cobertura_files[@]}"

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: coverage/merged.cobertura.xml
          badge: true
          format: markdown
          output: both

      - name: Write to job summary
        run: |
          set -euo pipefail
          if [ ! -f code-coverage-results.md ]; then
            echo "::error::code-coverage-results.md not produced by irongut/CodeCoverageSummary — check the filename input"
            exit 1
          fi
          cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Add coverage PR comment
        if: >-
          github.event_name == 'pull_request'
          && github.actor != 'dependabot[bot]'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          recreate: true
          header: csharp-coverage
          path: code-coverage-results.md
